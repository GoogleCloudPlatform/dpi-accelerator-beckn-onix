name: 'Build Onix Artifacts'

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-only:
    name: 'Build onixctl, Plugins, and Local Image'
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v4
      
      - name: 'Set up Go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: 'Set up Docker Buildx'
        uses: docker/setup-buildx-action@v3

      - name: 'Build and Run onixctl'
        run: |
          cd onix && go build ./cmd/onixctl && cd .. && ./onix/onixctl --config onix/deploy/onix-installer/adapter_artifacts/source.yaml
          