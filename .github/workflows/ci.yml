  build-python-installer:
    name: Build Python Installer Backend
    runs-on: ubuntu-latest
    needs: update-lock-files
    permissions:
      contents: write 
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        # Using PAT here allows the subsequent commit to trigger a new workflow run
        token: ${{ secrets.PAT_TOKEN }}
        ref: ${{ github.head_ref || github.ref_name }} 
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.12'

    # - name: Generate updated requirements.txt
    #   run: |
    #       python -m pip install --upgrade pip pip-tools
    #       cd deploy/onix_installer/backend
          
    #       # 3. Generate the hashed requirements
    #       # Note: This assumes you maintain your base dependencies in a requirements.in file.
    #       # If you use a different script to generate your file, replace this line with your command!
    #       pip-compile --generate-hashes requirements.in -o requirements.txt
          
    #       echo "Run your command to generate requirements.txt here"

    # - name: Commit and Push requirements.txt
    #   run: |
    #     git config --global user.name 'github-actions[bot]'
    #     git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
    #     # Only add the specific requirements file to avoid committing coverage or cache files
    #     git add deploy/onix_installer/backend/requirements.txt
        
    #     # Check if the requirements.txt file actually changed
    #     if ! git diff-index --quiet HEAD; then
    #       git commit -m "chore: auto-generate updated requirements.txt"
    #       git push
    #     else
    #       echo "No changes to requirements.txt. Skipping push."
    #     fi
    
    - name: Install Dependencies
      run: |
          python -m pip install --upgrade pip
          pip install coverage
          # If you need tools like pip-tools to generate requirements, install them here:
          # pip install pip-tools
          
          # We will still try to install existing requirements to run the tests
          if [ -f "deploy/onix_installer/backend/requirements.txt" ]; then
            pip install -r deploy/onix_installer/backend/requirements.txt --require-hashes
          fi

    - name: Run Python Tests with Coverage
      run: |
          cd deploy/onix_installer/backend
          coverage run -m unittest discover tests

    - name: Generate Python coverage report
      run: |
          cd deploy/onix_installer/backend
          coverage html -d htmlcov

    - name: Upload Python coverage report
      uses: actions/upload-artifact@v4
      with:
          name: python-coverage
          path: deploy/onix_installer/backend/htmlcov

  build-frontend-installer:
    name: Build Angular Installer Frontend
    runs-on: ubuntu-latest
    needs: update-lock-files
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 'lts/*'

    - name: Install Dependencies
      run: |
        cd deploy/onix_installer/frontend
        npm install
   
    - name: Run Tests with Coverage
      run: |
        cd deploy/onix_installer/frontend
        npm test -- --watch=false --browsers=ChromeHeadless --code-coverage

    - name: Upload Frontend coverage report
      uses: actions/upload-artifact@v4
      with:
          name: frontend-coverage
          path: deploy/onix_installer/frontend/coverage

    - name: Build Frontend
      run: |
        cd deploy/onix_installer/frontend
        npm run build -- --configuration production
  
  deploy-pages:
    name: Deploy Reports to GitHub Pages
    runs-on: ubuntu-latest
    needs: [test-go, build-python-installer, build-frontend-installer]
    # Only run this job when pushing to the main branch
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Pages
        uses: actions/configure-pages@v4

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./coverage-reports 

      - name: Create index page and organize reports
        run: |
          mv ./coverage-reports/go-coverage/coverage.html ./coverage-reports/go-coverage.html
          mv ./coverage-reports/python-coverage ./coverage-reports/python
          mv ./coverage-reports/frontend-coverage ./coverage-reports/frontend
          
          echo '<html><head><title>Test Coverage Reports</title></head><body>' > ./coverage-reports/index.html
          echo '<h1>Onix Test Coverage Reports</h1>' >> ./coverage-reports/index.html
          echo '<ul>' >> ./coverage-reports/index.html
          echo '<li><a href="go-coverage.html">Go Microservices Coverage</a></li>' >> ./coverage-reports/index.html
          echo '<li><a href="python/index.html">Python Installer Coverage</a></li>' >> ./coverage-reports/index.html
          echo '<li><a href="frontend/frontend-test/index.html">Frontend Installer Coverage</a></li>' >> ./coverage-reports/index.html
          echo '</ul></body></html>' >> ./coverage-reports/index.html

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./coverage-reports

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-and-run-onixctl:
    name: 'Build onixctl, Plugins, and Adapter Image'
    runs-on: ubuntu-latest
    needs: test-go

    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v4

      - name: 'Set up Go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: 'Set up Docker Buildx'
        uses: docker/setup-buildx-action@v3

      - name: 'Build and Run onixctl'
        run: |
          go build ./cmd/onixctl && ./onixctl --config deploy/onix_installer/adapter_artifacts/source.yaml
