name: Onix CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  
  update-lock-files:
    name: Generate and Commit All Lock Files
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT_TOKEN }}
        ref: ${{ github.head_ref || github.ref_name }}
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'

    - name: Generate go.sum
      run: |
        go mod download

    - name: Generate Python requirements.txt
      run: |
        python -m pip install --upgrade pip pip-tools
        cd deploy/onix_installer/backend
        pip-compile --generate-hashes requirements.in -o requirements.txt

    - name: Generate Angular package-lock.json
      run: |
        cd deploy/onix_installer/frontend
        npm install --package-lock-only

    - name: Commit and Push All Lock Files
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # Add all potential lock files
        git add go.mod go.sum deploy/onix_installer/backend/requirements.txt deploy/onix_installer/frontend/package-lock.json
        
        # Check if anything actually changed before committing
        if ! git diff-index --quiet HEAD; then
          # Using [skip ci] prevents an infinite loop of workflows triggering each other
          git commit -m "chore: auto-generate lock files (go.sum, requirements.txt, package-lock.json)"
          git push
        else
          echo "No lock files changed. Skipping push."
        fi

  test-go:
    name: Test Go Microservices
    runs-on: ubuntu-latest
    needs: update-lock-files
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v3
      with:
        go-version: '1.24'

    - name: Run Go Tests and Generate Merged Coverage
      run: |
          go test -coverprofile=coverage.out -coverpkg=./... ./...
                    

    - name: Convert merged coverage to HTML
      run: |
          go tool cover -html=coverage.out -o coverage.html

    - name: Upload Go coverage report
      uses: actions/upload-artifact@v4
      with:
          name: go-coverage
          path: coverage.html

  build-go-binaries:
    name: Build Go Binaries
    runs-on: ubuntu-latest
    needs: test-go
    strategy:
      matrix:
        service: [admin, gateway, registry, subscriber]
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v3
      with:
        go-version: '1.24'

    - name: Build
      run: |
        cd cmd/${{ matrix.service }}
        go build -v -o ../../build/${{ matrix.service }} .

  build-docker-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build-go-binaries
    strategy:
      matrix:
        service: [gateway, registry, registry-admin, subscriber]
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile.${{ matrix.service }}
        platforms: linux/amd64
        push: false
        tags: ${{ matrix.service }}:latest
  

